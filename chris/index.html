<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chris Caldeira — Bullǣ Hub</title>
<meta name="description" content="Chris Caldeira, Founder da Bullǣ Hub — Venture Station.">
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --graphite:#1F1F1F;
    --champagne:#F6F2EE;
    --gold:#A87E32;
    --gold-soft:#C9A35E;
  }

  *{margin:0;padding:0;box-sizing:border-box;}

  body{
    font-family:'Inter',sans-serif;
    background:var(--graphite);
    color:var(--champagne);
    font-weight:300;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:6vh 6vw;
    position:relative;
    overflow:hidden;
    isolation:isolate;
  }

  .watermark{
    position:absolute;
    top:50%;
    right:-10%;
    width:480px;
    max-width:60vw;
    transform:translateY(-50%) rotate(-4deg);
    opacity:0.05;
    z-index:0;
    pointer-events:none;
    filter:brightness(0) saturate(100%) invert(0.94) sepia(0.25) saturate(2) hue-rotate(10deg) brightness(1.05);
  }

  .card{
    max-width:420px;
    width:100%;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
    z-index:1;
  }

  .logo{
    width:min(260px, 70vw);
    opacity:0;
    animation:fadeIn 1.2s ease forwards;
    margin-bottom:2.8rem;
  }

  .photo{
    width:148px;
    height:148px;
    border-radius:50%;
    object-fit:cover;
    object-position:top center;
    border:1px solid rgba(201,163,94,0.35);
    margin-bottom:2rem;
    opacity:0;
    animation:fadeUp 1.2s ease forwards;
    animation-delay:.15s;
  }

  .name{
    font-family:'Cormorant Garamond',serif;
    font-weight:500;
    font-size:1.9rem;
    color:var(--champagne);
    opacity:0;
    animation:fadeUp 1.2s ease forwards;
    animation-delay:.3s;
  }

  .role{
    margin-top:.4rem;
    font-size:.72rem;
    letter-spacing:0.18em;
    text-transform:uppercase;
    color:var(--gold-soft);
    opacity:0;
    animation:fadeUp 1.2s ease forwards;
    animation-delay:.42s;
  }

  .tagline{
    margin-top:1.8rem;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:1.05rem;
    color:rgba(246,242,238,0.72);
    max-width:30ch;
    line-height:1.55;
    opacity:0;
    animation:fadeUp 1.2s ease forwards;
    animation-delay:.55s;
  }

  .divider{
    width:36px;
    height:1px;
    background:rgba(201,163,94,0.4);
    margin:2.4rem 0;
    opacity:0;
    animation:fadeIn 1.2s ease forwards;
    animation-delay:.65s;
  }

  .contacts{
    display:flex;
    flex-direction:column;
    gap:1rem;
    width:100%;
    opacity:0;
    animation:fadeUp 1.2s ease forwards;
    animation-delay:.75s;
  }

  .contact-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:.6rem;
    padding:.95rem 1.4rem;
    border:1px solid rgba(201,163,94,0.3);
    border-radius:2px;
    text-decoration:none;
    color:var(--champagne);
    font-size:.84rem;
    letter-spacing:0.03em;
    transition:border-color .3s ease, background .3s ease;
  }

  .contact-btn:hover{
    border-color:var(--gold-soft);
    background:rgba(201,163,94,0.06);
  }

  .contact-btn .icon{
    width:15px;
    height:15px;
    flex-shrink:0;
  }

  .site-link{
    margin-top:2.2rem;
    font-size:.7rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--gold);
    text-decoration:none;
    border-bottom:1px solid transparent;
    transition:border-color .3s ease;
    opacity:0;
    animation:fadeIn 1.2s ease forwards;
    animation-delay:.9s;
  }

  .site-link:hover{ border-color:var(--gold); }

  .location{
    margin-top:3rem;
    font-size:.66rem;
    letter-spacing:0.08em;
    color:rgba(246,242,238,0.32);
    opacity:0;
    animation:fadeIn 1.2s ease forwards;
    animation-delay:1s;
  }

  @keyframes fadeUp{
    from{opacity:0; transform:translateY(12px);}
    to{opacity:1; transform:translateY(0);}
  }
  @keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
  }

  a:focus-visible{
    outline:2px solid var(--gold-soft);
    outline-offset:3px;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important;}
  }

  @media (max-width: 480px){
    .watermark{
      right:-22%;
      opacity:0.045;
    }
  }
</style>
</head>
